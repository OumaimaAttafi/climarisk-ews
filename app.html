<!DOCTYPE html>
<html>
<head>
<title>Try Model</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>Test Climate Risk Model</h1>

<form action="/predict" method="post">

<input name="ROA" placeholder="ROA" required>
<input name="ROE" placeholder="ROE" required>
<input name="Z" placeholder="Z-score" required>

<input name="LTD" placeholder="LTD_lag1" required>
<input name="HTD" placeholder="HTD_lag1" required>
<input name="ERD" placeholder="ERD_lag1" required>
<input name="EED" placeholder="EED_lag1" required>

<input name="GCPRI" placeholder="GCPRI" required>
<input name="CO2" placeholder="CO2" required>
<input name="RE" placeholder="Renewable Energy" required>

<button type="submit">Predict</button>

</form>

<h2>{{ prediction_text }}</h2>

</body>
</html>
